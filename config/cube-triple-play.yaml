# K=40 Flow+TRL cube-triple: same as ct_k40_g10_w5_n1_en8 but batch_size=1024, train to 1M steps
# gap=10 wmax=5 N=1 horizon=40 final_eval_N=8 (training anchor)
env_name: cube-triple-play-v0
run_group: flow_trl_k40_best_ct_g10_en8_bs1024
train_steps: 1000000
log_every_n_steps: 10000
save_every_n_steps: 100000
eval_every_n_steps: 0
horizon: 40
eval_episodes_per_task: 10
final_eval_episodes_per_task: 25
dynamics:
  subgoal_distribution: flow
  subgoal_stochastic_loss: mse
  subgoal_num_samples: 1
  subgoal_value_gap_scale: 10.0
  subgoal_value_weight_max: 5.0
  actor_p_curgoal: 0.0
  actor_p_trajgoal: 1.0
  actor_p_randomgoal: 0.0
  actor_geom_sample: false
  subgoal_temperature: 1.0
  subgoal_eval_seed: 0
  dynamics_N: 40
  subgoal_steps: 40
  subgoal_eval_num_samples: 1
critic_agent:
  full_chunk_horizon: 40
  discount: 0.995
  value_distance_weight_power: 1.0
  value_p_curgoal: 0.0
  value_p_trajgoal: 1.0
  value_p_randomgoal: 0.0
actor:
  spi_tau: 5.0
batch_size: 1024
final_eval_subgoal_eval_num_samples: '8'
